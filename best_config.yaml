table: ./output_ml/training_table.csv
subject_col: subject_id
target_col: target_score
split_mode: subject
batch_size: 8
seed: 42
force_cpu: false
split:
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15
model:
  hrv_hidden_dim: 256
  sensor_model_dim: 64
  fusion_hidden_dim: 256
  num_heads: 8
  num_sensor_layers: 2
  dropout: 0.21374358313676256
optimization:
  learning_rate: 0.00021180224720181333
  weight_decay: 9.880713407006271e-05
  epochs: 200
  patience: 75
  min_delta: 0.0001
loss:
  alpha: 0.48355604919498874
  beta: 0.10028415778810128
  margin: 15.0
  n_classes: 5
ca:
  enable_ca: false
  ca_input_mode: placeholder
  omega_f: 0.5
  omega_q: 0.5
  ca_tau: 0.5
  ca_expected_frequency: 1.0
  ca_expected_duration: 1.0
output:
  checkpoint_dir: output_ml\tuning\hybrid_tuning_v1\trial_checkpoints
  run_name: hybrid_tuning_v1_trial_040
  save_last: true
  history_csv: null
  report_dir: output_ml\tuning\hybrid_tuning_v1\trial_reports
