# Example experiment config for ml_train_hybrid.py

# Top-level quick settings
table: ./output_ml/training_table.csv
subject_col: subject_id
target_col: target_score
target_scale_mode: auto  # auto | map_1_5_to_0_100 | none
target_source_min: 1.0
target_source_max: 5.0
split_mode: subject
batch_size: 8
seed: 42
force_cpu: false
cv_mode: none   # none | loso | groupkfold
cv_folds: 5     # used when cv_mode=groupkfold

split:
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15

model:
  hrv_hidden_dim: 128
  sensor_model_dim: 128
  fusion_hidden_dim: 128
  num_heads: 4
  num_sensor_layers: 2
  dropout: 0.2

optimization:
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 200
  patience: 75
  min_delta: 0.0001

loss:
  alpha: 0.5
  beta: 0.3
  margin: 15.0
  n_classes: 5

ca:
  # Optional C_a term
  enable_ca: false
  ca_input_mode: placeholder  # placeholder | adl

  # Used when ca_input_mode=adl (comma-separated column names)
  # ca_prob_columns: "adl_prob_washing_hands,adl_prob_transfer"
  # ca_duration_columns: "dur_washing_hands,dur_transfer"

  omega_f: 0.5
  omega_q: 0.5
  ca_tau: 0.5
  ca_expected_frequency: 1.0
  ca_expected_duration: 1.0

output:
  checkpoint_dir: ./output_ml/checkpoints
  run_name: config_run
  save_last: true
  history_csv: null
  report_dir: ./output_ml/reports
